<!doctype html>
  <html>
    <head>
      <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
      <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
    </head>
    <body>
      <div id="terminal"></div>
      <script>
        function setup(htmlComponent) {
          let term = new Terminal();
          let preferences = JSON.parse(htmlComponent.Data);
          term.resize(preferences.cols, preferences.rows);
          term.options = preferences.options;
          term.open(document.getElementById("terminal"));

          term.onData((data) => {
            htmlComponent.sendEventToMATLAB("EventToFrontend", data);
          });

          htmlComponent.addEventListener("EventToFrontend", processEvent);

          function processEvent(event) {
            term.write("" + event.Data);
          }

          document.getElementById("terminal").addEventListener("contextmenu", processRightClick);

          function processRightClick(event) {
            htmlComponent.sendEventToMATLAB("contextmenu", [event.clientX, event.clientY]);
          }
        }
      </script>
    </body>
  </html>
